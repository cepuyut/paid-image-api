<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — PixelPay</title>
  <meta name="description" content="View your NFTs, creations, PXP balance, and transaction history on PixelPay.">
  <meta name="theme-color" content="#000000">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Profile — PixelPay">
  <meta property="og:description" content="View your NFTs, creations, and transaction history on PixelPay.">
  <meta property="og:url" content="https://pixelpayapi.com/profile">
  <meta property="og:image" content="https://pixelpayapi.com/og-image.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Profile — PixelPay">
  <meta name="twitter:description" content="Your PixelPay profile — NFTs, PXP balance, and history.">
  <meta name="twitter:image" content="https://pixelpayapi.com/og-image.svg">
  <meta name="twitter:site" content="@PixelPayAPI">
  <link rel="canonical" href="https://pixelpayapi.com/profile">
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .container { max-width: 960px; }
    /* Underline tabs for profile */
    .tabs { border-bottom: 1px solid var(--border); margin-bottom: 24px; gap: 4px; }
    .tab { padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; border-radius: 0; }
    .tab:hover { color: var(--text2); background: none; }
    .tab.active { color: var(--white); border-bottom-color: var(--white); background: none; }
    /* Profile-specific NFT grid (smaller cards) */
    .nft-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; padding-bottom: 32px; }
    .nft-card .info { padding: 10px 12px; }
    .nft-card .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nft-card .meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>

<div class="container">
  <nav>
    <a href="/" class="logo">
      <div class="logo-icon"><img src="/favicon.png" alt="PixelPay"></div>
      <div class="logo-text">PixelPay</div>
    </a>
    <div class="nav-right">
      <div class="nav-links">
        <a href="/studio">Studio</a>
        <a href="/gallery">Gallery</a>
        <a href="/marketplace">Marketplace</a>
        <a href="/swap">Swap</a>
        <a href="/profile" class="active">Profile</a>
      </div>
      <span class="pxp-badge" id="pxpBal" style="display:none">0 PXP</span>
      <button class="btn-wallet" id="walletBtn" onclick="handleWallet()">Connect Wallet</button>
    </div>
  </nav>

  <!-- Connect prompt (shown when no wallet) -->
  <div id="connectPrompt" class="connect-prompt">
    <h2>Your Profile</h2>
    <p>Connect your wallet to view your NFTs, creations, and transaction history.</p>
    <button onclick="handleWallet()">Connect Wallet</button>
  </div>

  <!-- Profile content (shown when wallet connected) -->
  <div id="profileContent" style="display:none">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">P</div>
      <div class="profile-info">
        <h1 id="profileName">PixelPay User</h1>
        <div class="profile-address" id="profileAddress" onclick="copyAddress()" title="Click to copy">0x...</div>
        <div class="profile-stats">
          <div class="profile-stat">
            <span class="profile-stat-value" id="statOwned">0</span>
            <span class="profile-stat-label">Owned</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-value" id="statCreated">0</span>
            <span class="profile-stat-label">Created</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-value" id="statGallery">0</span>
            <span class="profile-stat-label">Gallery</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-value" id="statTxns">0</span>
            <span class="profile-stat-label">Trades</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-value" id="statPxp" style="color:var(--green)">0</span>
            <span class="profile-stat-label">PXP</span>
          </div>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('owned')">Owned</button>
      <button class="tab" onclick="switchTab('created')">Created</button>
      <button class="tab" onclick="switchTab('history')">History</button>
    </div>

    <div id="ownedTab">
      <div class="nft-grid" id="ownedGrid">
        <div class="grid-loading"><div class="spinner"></div><p>Loading...</p></div>
      </div>
    </div>

    <div id="createdTab" style="display:none">
      <div class="nft-grid" id="createdGrid"></div>
    </div>

    <div id="historyTab" style="display:none">
      <div id="historyList"></div>
    </div>
  </div>

  <footer>
    PixelPay &mdash; Built on <a href="https://tempo.xyz">Tempo</a> with <a href="https://mpp.dev">MPP</a> &middot; <a href="https://x.com/PixelPayAPI">@PixelPayAPI</a>
  </footer>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
function sanitizeId(id) { return String(id).replace(/[^0-9]/g, ""); }

const TEMPO_CHAIN_ID = 4217;
const TEMPO_RPC = "https://rpc.tempo.xyz";
let walletConnected = false;
let walletAddress = null;
let profileData = null;
let currentTab = "owned";

function showToast(msg, type = "info") {
  const c = document.getElementById("toastContainer");
  const icon = type === "success" ? "&#10003;" : type === "error" ? "&#10007;" : "&#8505;";
  const t = document.createElement("div");
  t.className = "toast " + type;
  t.innerHTML = `<span class="toast-icon">${icon}</span>${esc(msg)}`;
  c.appendChild(t);
  setTimeout(() => { t.style.animation = "toastOut 0.3s ease forwards"; setTimeout(() => t.remove(), 300); }, 3000);
}

// ── Wallet ──
async function handleWallet() {
  if (walletConnected) return;
  if (!window.ethereum) { alert("Install a Web3 wallet (e.g. MetaMask) to continue."); return; }
  try {
    let provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const net = await provider.getNetwork();
    if (Number(net.chainId) !== TEMPO_CHAIN_ID) {
      try {
        await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: "0x" + TEMPO_CHAIN_ID.toString(16) }] });
      } catch (e) {
        if (e.code === 4902) {
          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{ chainId: "0x" + TEMPO_CHAIN_ID.toString(16), chainName: "Tempo", rpcUrls: [TEMPO_RPC], nativeCurrency: { name: "pathUSD", symbol: "pUSD", decimals: 6 } }]
          });
        }
      }
      provider = new ethers.BrowserProvider(window.ethereum);
    }
    const signer = await provider.getSigner();
    walletAddress = await signer.getAddress();
    walletConnected = true;
    const btn = document.getElementById("walletBtn");
    btn.textContent = walletAddress.slice(0, 6) + "..." + walletAddress.slice(-4);
    btn.classList.add("connected");
    showProfile();
  } catch (e) {
    console.error("Wallet error:", e);
    showToast("Failed to connect wallet", "error");
  }
}

async function refreshPXP(addr) {
  try {
    const r = await fetch("/v1/pxp/balance/" + addr);
    if (!r.ok) return;
    const d = await r.json();
    const el = document.getElementById("pxpBal");
    if (window.animatePxp) window.animatePxp(el, d.formatted); else el.textContent = d.formatted + " PXP";
    el.style.display = "";
    document.getElementById("statPxp").textContent = d.formatted;
  } catch(_){}
}

function showProfile() {
  document.getElementById("connectPrompt").style.display = "none";
  document.getElementById("profileContent").style.display = "";
  document.getElementById("profileAddress").textContent = walletAddress;
  document.getElementById("profileAvatar").textContent = walletAddress.slice(2, 4).toUpperCase();
  refreshPXP(walletAddress);
  loadProfile();
}

async function copyAddress() {
  await navigator.clipboard.writeText(walletAddress);
  showToast("Address copied!", "success");
}

// ── Load profile ──
async function loadProfile() {
  try {
    const res = await fetch(`/v1/user/${walletAddress}/profile`);
    if (!res.ok) throw new Error("Failed");
    profileData = await res.json();

    document.getElementById("statOwned").textContent = profileData.total_owned || 0;
    document.getElementById("statCreated").textContent = profileData.total_created || 0;
    document.getElementById("statGallery").textContent = profileData.galleryCount || 0;
    document.getElementById("statTxns").textContent = profileData.history?.length || 0;

    renderTab();
  } catch (e) {
    console.error("Profile error:", e);
    showToast("Failed to load profile", "error");
  }
}

// ── Tabs ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t, i) => {
    t.classList.toggle("active", ["owned", "created", "history"][i] === tab);
  });
  document.getElementById("ownedTab").style.display = tab === "owned" ? "" : "none";
  document.getElementById("createdTab").style.display = tab === "created" ? "" : "none";
  document.getElementById("historyTab").style.display = tab === "history" ? "" : "none";
  renderTab();
}

function renderTab() {
  if (!profileData) return;
  if (currentTab === "owned") renderNFTGrid("ownedGrid", profileData.owned, "You don't own any NFTs yet.");
  else if (currentTab === "created") renderNFTGrid("createdGrid", profileData.created, "You haven't created any NFTs yet.");
  else if (currentTab === "history") renderHistory();
}

function renderNFTGrid(gridId, nfts, emptyMsg) {
  const grid = document.getElementById(gridId);
  if (!nfts || nfts.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">&#9633;</div><p>${esc(emptyMsg)}</p></div>`;
    return;
  }
  grid.innerHTML = nfts.map(nft => {
    const name = esc((nft.prompt || nft.name || "NFT #" + nft.tokenId).slice(0, 50));
    const model = nft.model ? esc(nft.model.replace("fal-ai/", "")) : "";
    const tid = sanitizeId(nft.tokenId || "0");
    const img = esc(nft.image_url || "");
    return `<div class="nft-card" data-token-id="${tid}">
      <img src="${img}" alt="${name}" loading="lazy" class="img-fade" onerror="this.style.background='var(--surface3)'">
      <div class="info">
        <div class="name" title="${name}">#${tid} ${name}</div>
        <div class="meta">${model}</div>
      </div>
    </div>`;
  }).join("");
}

document.addEventListener("click", function(e) {
  const card = e.target.closest(".nft-card[data-token-id]");
  if (card) window.location.href = "/marketplace#nft-" + sanitizeId(card.dataset.tokenId);
});

function renderHistory() {
  const list = document.getElementById("historyList");
  const history = profileData.history || [];
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">&#9633;</div><p>No transaction history yet.</p></div>';
    return;
  }
  list.innerHTML = history.map(tx => {
    const name = esc((tx.name || "NFT #" + tx.tokenId));
    const price = tx.price ? "$" + (Number(tx.price) / 1e6).toFixed(2) : "";
    const pxpPaid = tx.payment === "pxp" && tx.pxp_amount ? " (" + (Number(tx.pxp_amount) / 1e18).toFixed(0) + " PXP)" : "";
    const counterparty = tx.type === "buy"
      ? "from " + esc(shortAddr(tx.seller))
      : "to " + esc(shortAddr(tx.buyer));
    const ago = esc(timeAgo(tx.timestamp));
    const img = esc(tx.image_url || "");
    const t = tx.type === "buy" ? "buy" : "sell";
    return `<div class="history-item">
      <img src="${img}" alt="" onerror="this.style.display='none'">
      <div class="history-info">
        <div class="history-name">${name}</div>
        <div class="history-detail">${counterparty} &middot; ${ago}</div>
      </div>
      <div class="history-right">
        <div class="history-price ${t}">${t === "buy" ? "-" : "+"}${price}${pxpPaid}</div>
        <span class="history-type ${t}">${t === "buy" ? "Bought" : "Sold"}</span>
      </div>
    </div>`;
  }).join("");
}

function shortAddr(addr) {
  if (!addr) return "?";
  return addr.slice(0, 6) + "..." + addr.slice(-4);
}

function timeAgo(ts) {
  if (!ts) return "";
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return mins + "m ago";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + "h ago";
  const days = Math.floor(hrs / 24);
  return days + "d ago";
}

// ── Init ──
async function init() {
  if (window.ethereum) {
    try {
      const accounts = await window.ethereum.request({ method: "eth_accounts" });
      if (accounts.length > 0) { await handleWallet(); }
    } catch (_) {}
  }
}
init();
</script>
<script src="/nav.js"></script>
<script src="/animations.js"></script>
</body>
</html>
