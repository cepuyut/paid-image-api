<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — PixelPay</title>
  <meta name="description" content="Browse AI-generated images from the PixelPay community. Publish your creations to the public gallery.">
  <meta name="theme-color" content="#000000">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gallery — PixelPay">
  <meta property="og:description" content="Browse AI-generated images from the PixelPay community.">
  <meta property="og:url" content="https://pixelpayapi.com/gallery">
  <meta property="og:image" content="https://pixelpayapi.com/og-image.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Gallery — PixelPay">
  <meta name="twitter:description" content="Browse AI-generated images from the PixelPay community.">
  <meta name="twitter:image" content="https://pixelpayapi.com/og-image.svg">
  <meta name="twitter:site" content="@PixelPayAPI">
  <link rel="canonical" href="https://pixelpayapi.com/gallery">
  <link rel="icon" type="image/png" href="/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .container { max-width: 960px; }
    /* Underline tabs override for gallery */
    .tabs { border-bottom: 1px solid var(--border); margin-bottom: 24px; padding-top: 16px; gap: 0; }
    .tab { padding: 10px 20px; font-size: 14px; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; border-radius: 0; }
    .tab:hover { color: var(--text); background: none; }
    .tab.active { color: var(--white); border-bottom-color: var(--white); background: none; }
  </style>
</head>
<body>

<div class="container">
  <nav>
    <a href="/" class="logo">
      <div class="logo-icon"><img src="/favicon.png" alt="PixelPay"></div>
      <div class="logo-text">PixelPay</div>
    </a>
    <div class="nav-right">
      <div class="nav-links">
        <a href="/studio">Studio</a>
        <a href="/gallery" class="active">Gallery</a>
        <a href="/marketplace">Marketplace</a>
        <a href="/swap">Swap</a>
        <a href="/profile">Profile</a>
      </div>
      <span class="pxp-badge" id="pxpBal" style="display:none">0 PXP</span>
      <button id="walletBtn" onclick="connectWallet()" class="btn-wallet">Connect</button>
    </div>
  </nav>

  <div class="page-header">
    <h1>Gallery</h1>
    <p>Your images are private by default. Publish your favorites to the public gallery.</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('my')" id="tabMy">My Gallery</button>
    <button class="tab" onclick="switchTab('public')" id="tabPublic">Public Gallery</button>
  </div>

  <div class="gallery-grid" id="galleryGrid">
    <div class="empty-state" id="emptyState">
      <div class="icon">&#9633;</div>
      <p id="emptyText">Connect your wallet to see your images.</p>
    </div>
  </div>

  <footer>
    PixelPay &mdash; Built on <a href="https://tempo.xyz">Tempo</a> with <a href="https://mpp.dev">MPP</a> &middot; <a href="https://x.com/PixelPayAPI">@PixelPayAPI</a>
  </footer>
</div>

<!-- Image Detail Modal -->
<div class="modal-overlay" id="imageModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content" style="position:relative">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <img id="modalImg" src="" alt="">
    <div class="modal-body">
      <div class="modal-prompt" id="modalPrompt"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-actions">
        <button onclick="downloadModalImage()">&#11015; Download</button>
        <button onclick="copyPrompt()">&#128203; Copy Prompt</button>
        <button onclick="openInGenerator()">&#9998; Use Prompt</button>
        <input type="text" id="galleryNftName" placeholder="Name your NFT..." maxlength="80" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:0.85rem;width:150px;display:none">
        <button id="modalMintBtn" onclick="handleGalleryMint()">&#9734; Mint NFT</button>
        <button id="modalPublishBtn" onclick="togglePublish()" style="display:none">&#127758; Publish</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let galleryItems = [];
let publicItems = [];
let currentModalItem = null;
let currentModalIdx = -1;
let currentTab = "my";
let publicImageUrls = new Set();
let mintedImages = new Set(); // Track minted images to prevent duplicate mints

// ── Helpers ──
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }

// ── Toast ──
function showToast(msg, type = "info") {
  const c = document.getElementById("toastContainer");
  const icon = type === "success" ? "&#10003;" : type === "error" ? "&#10007;" : "&#8505;";
  const t = document.createElement("div");
  t.className = "toast " + type;
  t.innerHTML = `<span class="toast-icon">${icon}</span>${esc(msg)}`;
  c.appendChild(t);
  setTimeout(() => { t.style.animation = "toastOut 0.3s ease forwards"; setTimeout(() => t.remove(), 300); }, 3000);
}

function showGridLoading() {
  document.getElementById("galleryGrid").innerHTML = '<div class="grid-loading"><div class="spinner"></div><p>Loading...</p></div>';
}

// ── Wallet ──
const TEMPO_CHAIN = { chainId: "0x1079", chainName: "Tempo", rpcUrls: ["https://rpc.tempo.xyz"], nativeCurrency: { name: "pathUSD", symbol: "pUSD", decimals: 6 }, blockExplorerUrls: ["https://explorer.tempo.xyz"] };
let walletAddress = null, walletSigner = null, NFT_CONTRACT = "", NFT_ABI = ["function mint(address to, string uri) returns (uint256)", "function totalSupply() view returns (uint256)"];

async function connectWallet() {
  if (!window.ethereum) { alert("Install MetaMask or a Web3 wallet."); return; }
  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    await window.ethereum.request({ method: "eth_requestAccounts" });
    try { await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: "0x1079" }] }); }
    catch(e) { if (e.code === 4902) await window.ethereum.request({ method: "wallet_addEthereumChain", params: [TEMPO_CHAIN] }); }
    walletSigner = await provider.getSigner();
    walletAddress = await walletSigner.getAddress();
    const btn = document.getElementById("walletBtn");
    btn.textContent = walletAddress.slice(0,6) + "..." + walletAddress.slice(-4);
    btn.style.background = "#111"; btn.style.color = "#0f0"; btn.style.border = "1px solid #333";
    localStorage.setItem("pixelpay_wallet", walletAddress);
    refreshPXP(walletAddress);
    loadMyGallery();
  } catch(e) {
    console.error("Wallet connect error:", e);
    showToast("Failed to connect wallet", "error");
  }
}

fetch("/pixelpay/nft-config").then(r=>r.json()).then(c=>{ NFT_CONTRACT = c.nft_contract || ""; }).catch(()=>{});

// ── Tabs ──
function switchTab(tab) {
  currentTab = tab;
  document.getElementById("tabMy").classList.toggle("active", tab === "my");
  document.getElementById("tabPublic").classList.toggle("active", tab === "public");
  if (tab === "my") {
    if (walletAddress) loadMyGallery();
    else renderGrid([], "Connect your wallet to see your images.");
  } else {
    loadPublicGallery();
  }
}

// ── Load galleries ──
async function loadPublicGallery() {
  showGridLoading();
  try {
    const res = await fetch("/v1/gallery");
    if (!res.ok) throw new Error("Failed to load");
    const data = await res.json();
    publicItems = (data.images || []).filter(i => i.image_url);
    publicImageUrls = new Set(publicItems.map(i => i.image_url));
    renderGrid(publicItems, "No public images yet. Be the first to publish!");
  } catch(e) {
    console.error("Public gallery error:", e);
    renderGrid([], "Failed to load gallery. Please refresh.");
    showToast("Failed to load public gallery", "error");
  }
}

async function loadMyGallery() {
  if (!walletAddress) return;
  showGridLoading();
  try {
    const [pubRes, res] = await Promise.all([
      fetch("/v1/gallery"),
      fetch(`/v1/gallery/my/${walletAddress}`)
    ]);
    if (pubRes.ok) {
      const pubData = await pubRes.json();
      publicImageUrls = new Set((pubData.images || []).filter(i => i.wallet?.toLowerCase() === walletAddress.toLowerCase()).map(i => i.image_url));
    }
    if (!res.ok) throw new Error("Failed to load");
    const data = await res.json();
    galleryItems = (data.images || []).filter(i => i.image_url);
    renderGrid(galleryItems, "No images yet. Generate your first image!");
  } catch(e) {
    console.error("My gallery error:", e);
    renderGrid([], "Failed to load gallery. Please refresh.");
    showToast("Failed to load your gallery", "error");
  }
}

function renderGrid(items, emptyMsg) {
  const grid = document.getElementById("galleryGrid");

  if (!items || items.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">&#9633;</div><p>${emptyMsg}</p></div>`;
    return;
  }

  grid.innerHTML = items.map((item, idx) => {
    const safePrompt = (item.prompt || "").replace(/</g, "&lt;").replace(/"/g, "&quot;");
    const shortModel = (item.model || "").replace("fal-ai/", "");
    const ago = timeAgo(item.timestamp);
    const styleTag = item.style ? `<span class="style-tag">${esc(item.style)}</span>` : "";
    const safeUrl = esc(item.image_url || "");
    const isPublished = currentTab === "my" && publicImageUrls.has(item.image_url);
    const pubBadge = isPublished ? '<div class="public-badge">Public</div>' : '';
    return `
      <div class="gallery-card" onclick="openModal(${idx})">
        ${pubBadge}
        <img src="${safeUrl}" alt="${safePrompt}" loading="lazy">
        <div class="card-info">
          <div class="card-prompt" title="${safePrompt}">${safePrompt}</div>
          <div class="card-meta">
            <span>${ago}</span>
            ${styleTag}
          </div>
        </div>
      </div>`;
  }).join("");
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return mins + "m ago";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + "h ago";
  return Math.floor(hrs / 24) + "d ago";
}

// ── Modal ──
function openModal(idx) {
  const items = currentTab === "my" ? galleryItems : publicItems;
  const item = items[idx];
  if (!item) return;
  currentModalItem = item;
  currentModalIdx = idx;
  document.getElementById("modalImg").src = item.image_url;
  document.getElementById("modalPrompt").textContent = item.prompt || "";
  const model = (item.model || "").replace("fal-ai/", "");
  const style = item.style ? ` \u00b7 ${item.style}` : "";
  const ago = timeAgo(item.timestamp);
  document.getElementById("modalMeta").textContent = `${model}${style} \u00b7 ${ago}`;

  // Show publish button only in My Gallery tab
  const pubBtn = document.getElementById("modalPublishBtn");
  if (currentTab === "my" && walletAddress) {
    pubBtn.style.display = "";
    const isPublished = publicImageUrls.has(item.image_url);
    pubBtn.textContent = isPublished ? "\ud83c\udf10 Unpublish" : "\ud83c\udf10 Publish";
    pubBtn.classList.toggle("published", isPublished);
  } else {
    pubBtn.style.display = "none";
  }

  // Reset NFT name input
  const nftNameInput = document.getElementById("galleryNftName");
  nftNameInput.value = "";
  nftNameInput.style.display = "none";

  // Check if image already minted — if so, disable mint button
  const mintBtn = document.getElementById("modalMintBtn");
  const imgUrl = item.image_url || "";
  const isMinted = mintedImages.has(imgUrl);
  if (isMinted) {
    mintBtn.textContent = "Already Minted";
    mintBtn.style.color = "#0f0"; mintBtn.style.borderColor = "#0f0";
    mintBtn.disabled = true;
    mintBtn.onclick = null;
  } else {
    mintBtn.textContent = "\u2606 Mint NFT";
    mintBtn.style.color = ""; mintBtn.style.borderColor = "";
    mintBtn.disabled = false;
    mintBtn.onclick = mintFromGallery;
  }

  document.getElementById("imageModal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("imageModal").classList.remove("open");
  document.body.style.overflow = "";
  currentModalItem = null;
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

function downloadModalImage() {
  if (!currentModalItem) return;
  const a = document.createElement("a");
  a.href = currentModalItem.image_url;
  a.download = "pixelpay-" + (currentModalItem.prompt || "image").replace(/[^a-z0-9]/gi, "-").slice(0, 30) + ".png";
  a.target = "_blank";
  a.click();
}

function copyPrompt() {
  if (!currentModalItem) return;
  navigator.clipboard.writeText(currentModalItem.prompt || "");
  const el = document.querySelector(".modal-actions button:nth-child(2)");
  el.textContent = "Copied!";
  setTimeout(() => el.innerHTML = "&#128203; Copy Prompt", 1500);
}

function openInGenerator() {
  if (!currentModalItem) return;
  const params = new URLSearchParams({ prompt: currentModalItem.prompt || "" });
  if (currentModalItem.model) params.set("model", currentModalItem.model);
  if (currentModalItem.style) params.set("style", currentModalItem.style);
  window.location.href = "/?" + params.toString();
}

// ── Publish / Unpublish ──
async function togglePublish() {
  if (!currentModalItem || !walletAddress) return;
  const btn = document.getElementById("modalPublishBtn");
  const isPublished = publicImageUrls.has(currentModalItem.image_url);
  btn.disabled = true;
  btn.textContent = isPublished ? "Unpublishing..." : "Publishing...";
  try {
    const endpoint = isPublished ? "/v1/gallery/unpublish" : "/v1/gallery/publish";
    const res = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        image_url: currentModalItem.image_url,
        wallet: walletAddress,
        prompt: currentModalItem.prompt,
        model: currentModalItem.model,
        style: currentModalItem.style,
        seed: currentModalItem.seed
      })
    });
    if (!res.ok) throw new Error("Failed");
    if (isPublished) {
      publicImageUrls.delete(currentModalItem.image_url);
      btn.textContent = "\ud83c\udf10 Publish";
      btn.classList.remove("published");
    } else {
      publicImageUrls.add(currentModalItem.image_url);
      btn.textContent = "\ud83c\udf10 Unpublish";
      btn.classList.add("published");
    }
    // Re-render grid to update badges
    if (currentTab === "my") renderGrid(galleryItems, "");
    showToast(isPublished ? "Removed from public gallery" : "Published to public gallery", "success");
  } catch(e) {
    btn.textContent = "Error";
    showToast("Failed to " + (isPublished ? "unpublish" : "publish"), "error");
    setTimeout(() => { btn.textContent = isPublished ? "\ud83c\udf10 Unpublish" : "\ud83c\udf10 Publish"; }, 2000);
  }
  btn.disabled = false;
}

// ── Mint NFT ──
function handleGalleryMint() {
  const nameInput = document.getElementById("galleryNftName");
  if (nameInput.style.display === "none") {
    nameInput.style.display = "inline-block";
    nameInput.focus();
    document.getElementById("modalMintBtn").textContent = "✦ Confirm Mint";
    return;
  }
  mintFromGallery();
}

async function mintFromGallery() {
  if (!currentModalItem) return;
  if (!walletAddress || !walletSigner) { alert("Connect your wallet first."); return; }
  if (!NFT_CONTRACT) { alert("NFT contract not configured."); return; }
  const btn = document.getElementById("modalMintBtn");
  btn.disabled = true; btn.textContent = "Uploading to IPFS...";
  try {
    const uploadRes = await fetch("/v1/nft/upload", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        image_url: currentModalItem.image_url,
        metadata: { name: document.getElementById("galleryNftName")?.value?.trim() || (currentModalItem.prompt || "PixelPay NFT").slice(0,50), description: currentModalItem.prompt || "", attributes: [{ trait_type: "Model", value: currentModalItem.model || "" }, { trait_type: "Style", value: currentModalItem.style || "none" }] }
      })
    });
    const upload = await uploadRes.json();
    if (!upload.metadata_uri) throw new Error(upload.detail || "IPFS upload failed");
    btn.textContent = "Minting on-chain...";
    const contract = new ethers.Contract(NFT_CONTRACT, NFT_ABI, walletSigner);
    const tx = await contract.mint(walletAddress, upload.metadata_uri);
    btn.textContent = "Confirming tx...";
    const receipt = await tx.wait();
    let tokenId = null;
    for (const log of receipt.logs) { try { const p = contract.interface.parseLog(log); if (p && p.name === "Transfer") { tokenId = p.args[2].toString(); break; } } catch(_){} }
    if (!tokenId) { const supply = await contract.totalSupply(); tokenId = (supply - 1n).toString(); }
    await fetch("/v1/nft/mint", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tokenId, wallet: walletAddress, prompt: currentModalItem.prompt, model: currentModalItem.model, style: currentModalItem.style, image_url: currentModalItem.image_url, metadata_uri: upload.metadata_uri, tx_hash: receipt.hash })
    }).catch(()=>{});
    btn.textContent = "Minted! #" + tokenId;
    btn.style.color = "#0f0"; btn.style.borderColor = "#0f0";
    btn.disabled = true; // Keep disabled — this image is already minted
    btn.onclick = null; // Remove click handler
    mintedImages.add(currentModalItem.image_url); // Track so modal knows it's minted
    showToast("NFT minted successfully! Token #" + tokenId, "success");
  } catch(e) {
    console.error("Mint error:", e);
    btn.textContent = "Mint failed";
    btn.style.color = "#f44"; btn.style.borderColor = "#f44";
    showToast("Mint failed: " + (e.reason || e.message || "Unknown error"), "error");
    setTimeout(() => { btn.textContent = "\u2606 Mint NFT"; btn.style.color = ""; btn.style.borderColor = ""; btn.disabled = false; }, 3000);
  }
}

async function refreshPXP(addr) {
  try {
    const r = await fetch("/v1/pxp/balance/" + addr);
    if (!r.ok) return;
    const d = await r.json();
    const el = document.getElementById("pxpBal");
    el.textContent = d.formatted + " PXP";
    el.style.display = "";
  } catch(_){}
}

// ── Init ──
async function init() {
  // Check if already authorized via eth_accounts (no popup)
  let autoConnected = false;
  if (window.ethereum) {
    try {
      const accounts = await window.ethereum.request({ method: "eth_accounts" });
      if (accounts.length > 0) { await connectWallet(); autoConnected = true; }
    } catch {}
  }
  if (!autoConnected) {
    switchTab("public");
  }
}
init();
</script>
<script src="/nav.js"></script>
</body>
</html>
